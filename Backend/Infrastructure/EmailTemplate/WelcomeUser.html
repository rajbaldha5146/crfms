<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>

<body style="
    margin:0;
    padding:0;
    background:#f8fafc;
    font-family:Arial,sans-serif;
">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:40px 20px;">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="
                        background:#ffffff;
                        border-radius:12px;
                        overflow:hidden;
                        border:1px solid #e2e8f0;
                    ">

                    <!-- Header -->

                    <tr>
                        <td style="
                            background:#0f172a;
                            padding:24px;
                            text-align:center;
                        ">
                            <h1 style="
                                color:white;
                                margin:0;
                                font-size:24px;
                            ">
                                Code Review Feedback Management
                            </h1>
                        </td>
                    </tr>

                    <!-- Content -->

                    <tr>
                        <td style="padding:32px;">

                            <h2 style="
                                margin-top:0;
                                color:#0f172a;
                            ">
                                Welcome {{FullName}}
                            </h2>

                            <p style="
                                color:#475569;
                                line-height:1.7;
                                font-size:15px;
                            ">
                                Your account has been created successfully.
                            </p>

                            <table width="100%" cellpadding="12"
                                style="
                                    margin-top:24px;
                                    border:1px solid #e2e8f0;
                                    border-collapse:collapse;
                                ">

                                <tr>
                                    <td style="
                                        font-weight:bold;
                                        border:1px solid #e2e8f0;
                                        width:180px;
                                    ">
                                        Email
                                    </td>

                                    <td style="
                                        border:1px solid #e2e8f0;
                                    ">
                                        {{Email}}
                                    </td>
                                </tr>

                                <tr>
                                    <td style="
                                        font-weight:bold;
                                        border:1px solid #e2e8f0;
                                    ">
                                        Temporary Password
                                    </td>

                                    <td style="
                                        border:1px solid #e2e8f0;
                                    ">
                                        {{Password}}
                                    </td>
                                </tr>

                                <tr>
                                    <td style="
                                        font-weight:bold;
                                        border:1px solid #e2e8f0;
                                    ">
                                        Role
                                    </td>

                                    <td style="
                                        border:1px solid #e2e8f0;
                                    ">
                                        {{Role}}
                                    </td>
                                </tr>

                            </table>

                            <div style="
                                margin-top:28px;
                                padding:16px;
                                background:#fef3c7;
                                border-radius:8px;
                                color:#92400e;
                                font-size:14px;
                            ">
                                Please login and change your password immediately for security purposes.
                            </div>

                        </td>
                    </tr>

                    <!-- Footer -->

                    <tr>
                        <td style="
                            padding:20px;
                            text-align:center;
                            background:#f8fafc;
                            color:#64748b;
                            font-size:13px;
                        ">
                            © Code Review Feedback Management System
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
